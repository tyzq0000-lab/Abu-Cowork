# Watch the upstream Abu-Cowork repo for new releases and open a tracking
# issue with the changelog + compare link. Merging stays manual — see
# UPSTREAM-SYNC.md for the conflict-resolution handbook.
name: upstream-watch

on:
  schedule:
    - cron: '0 1 * * *' # daily 09:00 Asia/Shanghai
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

env:
  UPSTREAM_REPO: PM-Shawn/Abu-Cowork

jobs:
  check-upstream-release:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check latest upstream release and open tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          release_json=$(gh api "repos/$UPSTREAM_REPO/releases/latest" 2>/dev/null) || {
            echo "No releases on upstream (or API error) — nothing to do."
            exit 0
          }
          tag=$(echo "$release_json" | jq -r '.tag_name')
          name=$(echo "$release_json" | jq -r '.name // .tag_name')
          url=$(echo "$release_json" | jq -r '.html_url')
          body=$(echo "$release_json" | jq -r '.body // "(no release notes)"')

          title="upstream release: $tag"

          existing=$(gh issue list --repo "$REPO" --state all --search "\"$title\" in:title" --json number --jq 'length')
          if [ "$existing" -gt 0 ]; then
            echo "Issue for $tag already exists — skipping."
            exit 0
          fi

          {
            echo "Upstream [$UPSTREAM_REPO](https://github.com/$UPSTREAM_REPO) published **[$name]($url)**."
            echo
            echo "- Compare: https://github.com/$UPSTREAM_REPO/releases/tag/$tag"
            echo "- Merge handbook: \`UPSTREAM-SYNC.md\`"
            echo
            echo "## Release notes"
            echo
            echo "$body"
          } > issue_body.md

          gh issue create --repo "$REPO" --title "$title" --body-file issue_body.md --label upstream || \
            gh issue create --repo "$REPO" --title "$title" --body-file issue_body.md
          echo "Opened tracking issue for $tag."
