name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Setup embedded Python runtime
        run: bash scripts/setup-python-runtime.sh
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Abu ${{ github.ref_name }}'
          releaseBody: |
            See the assets below for download links.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download updater assets from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release-assets
          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            -D release-assets \
            -p "*.tar.gz" -p "*.tar.gz.sig" -p "*.nsis.zip" -p "*.nsis.zip.sig"
          echo "Downloaded assets:"
          ls -la release-assets/

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          OSS_BASE="https://${{ secrets.OSS_BUCKET }}.${{ secrets.OSS_REGION }}.aliyuncs.com/releases/${VERSION}"

          # Read signatures
          AARCH64_SIG=$(cat release-assets/*aarch64*.tar.gz.sig 2>/dev/null || echo "")
          X86_64_SIG=$(cat release-assets/*x64*.tar.gz.sig 2>/dev/null || echo "")
          WINDOWS_SIG=$(cat release-assets/*.nsis.zip.sig 2>/dev/null || echo "")

          # Find filenames (exclude .sig files)
          AARCH64_FILE=$(ls release-assets/*aarch64*.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          X86_64_FILE=$(ls release-assets/*x64*.tar.gz 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          WINDOWS_FILE=$(ls release-assets/*.nsis.zip 2>/dev/null | grep -v '.sig' | head -1 | xargs basename 2>/dev/null || echo "")

          echo "aarch64: $AARCH64_FILE | x64: $X86_64_FILE | windows: $WINDOWS_FILE"

          # Build latest.json with python for safe JSON encoding
          python3 -c "
          import json, sys
          platforms = {}
          aarch64_file, aarch64_sig = '$AARCH64_FILE', '''$AARCH64_SIG'''
          x64_file, x64_sig = '$X86_64_FILE', '''$X86_64_SIG'''
          win_file, win_sig = '$WINDOWS_FILE', '''$WINDOWS_SIG'''
          oss_base = '$OSS_BASE'
          if aarch64_file and aarch64_sig:
              platforms['darwin-aarch64'] = {'signature': aarch64_sig.strip(), 'url': f'{oss_base}/{aarch64_file}'}
          if x64_file and x64_sig:
              platforms['darwin-x86_64'] = {'signature': x64_sig.strip(), 'url': f'{oss_base}/{x64_file}'}
          if win_file and win_sig:
              platforms['windows-x86_64'] = {'signature': win_sig.strip(), 'url': f'{oss_base}/{win_file}'}
          data = {
              'version': '$VERSION',
              'notes': 'See https://github.com/${{ github.repository }}/releases/tag/$VERSION',
              'pub_date': '$DATE',
              'platforms': platforms
          }
          json.dump(data, open('latest.json', 'w'), indent=2)
          print(json.dumps(data, indent=2))
          "

      - name: Install ossutil
        run: curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | bash

      - name: Configure ossutil
        run: |
          ossutil config \
            -e ${{ secrets.OSS_REGION }}.aliyuncs.com \
            -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

      - name: Upload to OSS
        run: |
          VERSION="${{ github.ref_name }}"
          BUCKET="oss://${{ secrets.OSS_BUCKET }}"

          # Upload update packages
          for file in release-assets/*; do
            [ -f "$file" ] || continue
            ossutil cp "$file" "${BUCKET}/releases/${VERSION}/$(basename $file)" -f
          done

          # Upload latest.json with no-cache
          ossutil cp latest.json "${BUCKET}/latest.json" -f --meta "Cache-Control:no-cache"

          echo "Done. Listing:"
          ossutil ls "${BUCKET}/releases/${VERSION}/"
