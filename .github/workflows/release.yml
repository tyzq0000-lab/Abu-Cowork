name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify release version
        shell: bash
        run: |
          set -euo pipefail
          export TAG_VERSION="${GITHUB_REF_NAME#v}"
          node --input-type=module <<'NODE'
          import { readFileSync } from 'node:fs';

          const tagVersion = process.env.TAG_VERSION ?? '';
          const packageVersion = JSON.parse(readFileSync('package.json', 'utf8')).version;
          const tauriVersion = JSON.parse(readFileSync('src-tauri/tauri.conf.json', 'utf8')).version;
          const cargoSource = readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoVersion = cargoSource.match(/^version\s*=\s*"([^"]+)"/m)?.[1] ?? '';
          const versions = { tagVersion, packageVersion, tauriVersion, cargoVersion };

          if (!/^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/.test(tagVersion)) {
            throw new Error(`Release tag must be v<semver>; received ${process.env.GITHUB_REF_NAME}`);
          }
          if (new Set(Object.values(versions)).size !== 1) {
            throw new Error(`Release version mismatch: ${JSON.stringify(versions)}`);
          }
          console.log(`Release version verified: ${tagVersion}`);
          NODE

      - name: Create draft GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release already exists; assets will be replaced."
          else
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "Fuyao ${{ github.ref_name }}" \
              --notes "See the assets below for download links." \
              --draft
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ matrix.target }}

      - name: Install dependencies
        run: npm ci

      - name: Setup embedded Python runtime
        run: bash scripts/setup-python-runtime.sh
        shell: bash

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VITE_CONSOLE_URL: ${{ secrets.VITE_CONSOLE_URL }}
          VITE_FUYAO_PACKAGE_HOSTS: ${{ secrets.VITE_FUYAO_PACKAGE_HOSTS }}
          VITE_UPROW_PLATFORM_HOSTS: ${{ secrets.VITE_UPROW_PLATFORM_HOSTS }}
        shell: bash
        run: |
          set -euo pipefail
          # Write signing key to file. GitHub Secrets injection or shell expansion
          # can append trailing bytes (observed: extra %/\n at end). Use Python to
          # strip non-base64 chars and then validate the result before building.
          #
          # Tauri 2 only reads TAURI_SIGNING_PRIVATE_KEY; it auto-detects file path vs content.
          python3 <<'PYEOF' > "$RUNNER_TEMP/tauri-signing-key.txt"
          import base64, os, re, sys
          raw = os.environ.get('RAW_KEY', '')
          if not raw.strip():
              raise SystemExit('TAURI_SIGNING_PRIVATE_KEY secret is missing')
          cleaned = re.sub(r'[^A-Za-z0-9+/=]', '', raw)
          try:
              base64.b64decode(cleaned, validate=True)
          except Exception as exc:
              raise SystemExit(f'TAURI_SIGNING_PRIVATE_KEY is not valid base64: {exc}')
          sys.stdout.write(cleaned)
          PYEOF
          trap 'rm -f "$RUNNER_TEMP/tauri-signing-key.txt"' EXIT
          export TAURI_SIGNING_PRIVATE_KEY="$RUNNER_TEMP/tauri-signing-key.txt"
          npx tauri build --target ${{ matrix.target }}

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          TAG="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"
          BUNDLE="src-tauri/target/${TARGET}/release/bundle"

          echo "=== Bundle contents ==="
          ls -la "$BUNDLE"/macos/ 2>/dev/null || true
          ls -la "$BUNDLE"/dmg/ 2>/dev/null || true
          ls -la "$BUNDLE"/nsis/ 2>/dev/null || true

          if [[ "$TARGET" == *"apple"* ]]; then
            # macOS .app.tar.gz has the same filename across architectures —
            # rename to include arch suffix to avoid Release upload collision.
            if [[ "$TARGET" == *"aarch64"* ]]; then
              ARCH_SUFFIX="aarch64"
            else
              ARCH_SUFFIX="x64"
            fi
            APP_TGZ_FILES=("$BUNDLE"/macos/*.app.tar.gz)
            DMG_FILES=("$BUNDLE"/dmg/*.dmg)
            if (( ${#APP_TGZ_FILES[@]} != 1 || ${#DMG_FILES[@]} != 1 )); then
              echo "Expected exactly one macOS updater archive and one DMG" >&2
              exit 1
            fi
            APP_TGZ="${APP_TGZ_FILES[0]}"
            if [[ ! -s "$APP_TGZ.sig" ]]; then
              echo "Missing macOS updater signature: $APP_TGZ.sig" >&2
              exit 1
            fi
            cp "$APP_TGZ" "$BUNDLE"/macos/Fuyao_${ARCH_SUFFIX}.app.tar.gz
            cp "$APP_TGZ.sig" "$BUNDLE"/macos/Fuyao_${ARCH_SUFFIX}.app.tar.gz.sig

            gh release upload "$TAG" "${DMG_FILES[0]}" --clobber
            gh release upload "$TAG" "$BUNDLE"/macos/Fuyao_${ARCH_SUFFIX}.app.tar.gz --clobber
            gh release upload "$TAG" "$BUNDLE"/macos/Fuyao_${ARCH_SUFFIX}.app.tar.gz.sig --clobber
          else
            # Tauri 2 signs the NSIS .exe installer directly (not a separate .nsis.zip).
            # The .exe is both the installer and the updater bundle.
            EXE_FILES=("$BUNDLE"/nsis/*-setup.exe)
            if (( ${#EXE_FILES[@]} != 1 )) || [[ ! -s "${EXE_FILES[0]}.sig" ]]; then
              echo "Expected exactly one signed Windows NSIS installer" >&2
              exit 1
            fi
            gh release upload "$TAG" "${EXE_FILES[0]}" --clobber
            gh release upload "$TAG" "${EXE_FILES[0]}.sig" --clobber
          fi

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      # Checkout FIRST: actions/checkout@v6 defaults to clean: true which runs
      # `git clean -ffdx` and would wipe any untracked dirs (like release-assets/)
      # created by a prior step. Keep checkout ahead of the download.
      - uses: actions/checkout@v6

      - name: Download updater assets from GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-assets

          echo "=== All release assets ==="
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name'

          gh release download "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            -D release-assets \
            -p "*.dmg" -p "*.tar.gz" -p "*.tar.gz.sig" -p "*-setup.exe" -p "*-setup.exe.sig"

          echo "=== Downloaded ==="
          ls -la release-assets/

      - name: Generate latest.json
        shell: bash
        env:
          VERSION_TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_REGION: ${{ secrets.OSS_REGION }}
        run: |
          set -euo pipefail
          python3 <<'PYEOF'
          import json, os, re
          from datetime import datetime, timezone
          from pathlib import Path

          def exactly_one(pattern):
              matches = list(Path('release-assets').glob(pattern))
              if len(matches) != 1:
                  raise SystemExit(f'Expected exactly one {pattern}, found {[p.name for p in matches]}')
              if matches[0].stat().st_size == 0:
                  raise SystemExit(f'Release asset is empty: {matches[0].name}')
              return matches[0]

          version_tag = os.environ['VERSION_TAG']  # e.g. "v0.11.2"
          version_num = version_tag.lstrip('v')
          repo = os.environ['REPO']
          if not os.environ.get('OSS_BUCKET') or not os.environ.get('OSS_REGION'):
              raise SystemExit('OSS_BUCKET and OSS_REGION secrets are required')
          oss_base = f"https://{os.environ['OSS_BUCKET']}.{os.environ['OSS_REGION']}.aliyuncs.com/releases/{version_tag}"

          assets = {
              'darwin-aarch64': (exactly_one('*aarch64*.tar.gz'), exactly_one('*aarch64*.tar.gz.sig')),
              'darwin-x86_64': (exactly_one('*x64*.tar.gz'), exactly_one('*x64*.tar.gz.sig')),
              'windows-x86_64': (exactly_one('*-setup.exe'), exactly_one('*-setup.exe.sig')),
          }
          dmgs = list(Path('release-assets').glob('*.dmg'))
          if len(dmgs) != 2 or any(path.stat().st_size == 0 for path in dmgs):
              raise SystemExit(f'Expected two non-empty macOS DMGs, found {[p.name for p in dmgs]}')

          # Extract release notes for this version from CHANGELOG.md.
          # Falls back to a GitHub link if the entry is missing.
          notes = f"See https://github.com/{repo}/releases/tag/{version_tag}"
          try:
              with open('CHANGELOG.md', encoding='utf-8') as f:
                  cl = f.read()
              # Match "## v0.11.2 ..." through just before the next "## v" or EOF
              pattern = rf'^## v{re.escape(version_num)}[^\n]*\n(.*?)(?=^## v|\Z)'
              m = re.search(pattern, cl, re.MULTILINE | re.DOTALL)
              if m:
                  body = m.group(1).strip()
                  if body:
                      notes = body
          except FileNotFoundError:
              pass

          platforms = {}
          for key, (artifact, signature_file) in assets.items():
              signature = signature_file.read_text(encoding='utf-8').strip()
              if not signature:
                  raise SystemExit(f'Updater signature is empty: {signature_file.name}')
              platforms[key] = {'signature': signature, 'url': f'{oss_base}/{artifact.name}'}

          data = {
              'version': version_num,
              'notes': notes,
              'pub_date': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ'),
              'platforms': platforms,
          }
          with open('latest.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          print(json.dumps(data, indent=2, ensure_ascii=False))
          PYEOF

      - name: Install ossutil
        run: curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash

      - name: Configure ossutil
        run: |
          ossutil config \
            -e ${{ secrets.OSS_REGION }}.aliyuncs.com \
            -i ${{ secrets.ALIYUN_ACCESS_KEY_ID }} \
            -k ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}

      - name: Upload to OSS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          BUCKET="oss://${{ secrets.OSS_BUCKET }}"

          for file in release-assets/*; do
            [ -f "$file" ] || continue
            ossutil cp "$file" "${BUCKET}/releases/${VERSION}/$(basename $file)" -f
          done

          ossutil cp latest.json "${BUCKET}/latest.json" -f --meta "Cache-Control:no-cache"

          echo "Done. Listing:"
          ossutil ls "${BUCKET}/releases/${VERSION}/"

          # Only publish the GitHub release after all updater assets and latest.json
          # have reached OSS. Failed jobs therefore never expose a partial release.
          gh release edit "$VERSION" --repo "${{ github.repository }}" --draft=false --latest
